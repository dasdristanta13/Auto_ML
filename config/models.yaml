# Which LLM provider+model powers each LangGraph node.
#
# SWITCHING PROVIDERS — one line: set `active_profile` to anthropic | openai |
# gemini. Or, without touching this file, set the AUTOML_LLM_PROFILE
# environment variable (takes precedence over active_profile).
# Escape hatches: AUTOML_LLM_MODEL forces one model id for every node;
# AUTOML_LLM_PROVIDER forces the provider (use together for a custom combo).
#
# EXECUTION BACKEND — native (default) uses the hand-rolled adapters in
# src/llm/client.py for anthropic/openai/gemini. litellm routes every call
# through the litellm library instead, which unlocks any of its 100+
# supported providers (Bedrock, Azure, Ollama, Mistral, Cohere, ...) just by
# setting `provider`/`model` on a profile to that provider's litellm name —
# no new adapter code needed. Switch with `backend:` below, or the
# AUTOML_LLM_BACKEND environment variable (takes precedence over this key).
# litellm must be installed (`pip install litellm`) to use backend: litellm.
#
# API keys come from environment variables (see .env.example):
# ANTHROPIC_API_KEY, OPENAI_API_KEY, GOOGLE_API_KEY, AZURE_OPENAI_API_KEY —
# never hardcoded here. Azure additionally needs azure_endpoint (and
# optionally api_version) set directly on its profile below, since those
# are non-secret.

backend: native

active_profile: openai

profiles:
  openai:
    provider: openai
    model: gpt-5-nano

  anthropic:
    provider: anthropic
    model: claude-haiku-4-5 # cheap/fast tier for simple nodes
    nodes:
      # stronger model where planning quality matters most (CLAUDE.md:
      # "cheaper/faster model for simple routing decisions, stronger model
      # for planning")
      feature_engineering: { model: claude-opus-4-8 }
      model_selection: { model: claude-opus-4-8 }
      report: { model: claude-opus-4-8 }

  gemini:
    provider: gemini
    model: gemini-2.5-flash

  azure:
    provider: azure
    model: gpt-5.4-nano   # Azure *deployment name*, not an OpenAI model id
    azure_endpoint: https://my-resource.openai.azure.com/
    api_version: "2025-04-01-preview"

  # Example: any litellm-supported provider works here once backend:
  # litellm is set above, with zero new code in src/llm/client.py.
  # bedrock_claude:
  #   provider: bedrock
  #   model: anthropic.claude-3-haiku-20240307-v1:0
  #   fallback_models:        # only used when backend: litellm
  #     - openai/gpt-5-nano

# Generation parameters per node — provider-independent, shared by every
# profile. The active profile supplies provider+model; these supply the rest.
default:
  temperature: 0.0
  max_tokens: 4096

nodes:
  understand_usecase:
    temperature: 0.0
    max_tokens: 2048

  feature_engineering:
    temperature: 0.0
    max_tokens: 4096

  model_selection:
    temperature: 0.0
    max_tokens: 2048

  report:
    temperature: 0.2
    max_tokens: 4096

  explainability:
    temperature: 0.2
    max_tokens: 512

  explainability_captions:
    temperature: 0.2
    max_tokens: 768

  chat:
    temperature: 0.2
    max_tokens: 1024
